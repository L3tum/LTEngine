services:
  # LTEngine translation API
  ltengine:
    image: ghcr.io/libretranslate/ltengine:main
    container_name: ltengine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5050"
    environment:
      LTE_MODEL: gemma3-4b  # use any model available on your backend
      LTE_BACKEND_HOST: ollama:11434

  # Optional: Ollama service for model serving, use any service you want that exposes an OpenAI-compatible API
