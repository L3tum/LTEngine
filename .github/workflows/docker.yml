name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-forgejo:
    if: github.server_url != 'https://github.com'
    uses: l3tum/reusable-workflows/.github/workflows/publish-forgejo.yml@main
    with:
      DOCKERFILE: Dockerfile
      PUSH: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    secrets:
      PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}

  build-github:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name builder --driver docker-container --use

      - name: Log in to GitHub Container Registry
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ltengine"
          TAGS=()
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
            TAGS+=("$IMAGE:$VERSION" "$IMAGE:$MAJOR_MINOR")
          fi
          BRANCH=$(echo "$GITHUB_REF" | sed 's|refs/heads/||')
          TAGS+=("$IMAGE:$BRANCH")
          SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS+=("$IMAGE:$SHA")

          docker buildx build \
            --push \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --tag "${TAGS[0]}" ${TAGS[@]:1} \
            .

          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

